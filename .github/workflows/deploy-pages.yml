name: Deploy web demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # `npm install` (not `npm ci`) so platform-specific optional deps that npm
      # may prune from the lockfile on one OS are reconciled on the CI runner.
      # `--omit=optional` skips the Node-only discovery dependency (hyperdht),
      # which the web build does not use.
      - run: npm install --no-audit --no-fund --omit=optional
      - run: npm run web:build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
